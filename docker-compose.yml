version: '3'
services:
  ibim-backoffice-app:
    build:
      context: .
      dockerfile: ./Dockerfile
    environment:
      - IBIM_BACKOFFICE_PATH=${IBIM_BACKOFFICE_PATH}
      - BACKOFFICE_STORAGE_VOLUME_PATH=${BACKOFFICE_STORAGE_VOLUME_PATH}
    ports:
      - ${IBIM_BACKOFFICE_PORT}:80
    volumes:
      # - .:/usr/share/nginx/ibim-license-management
      - ${BACKOFFICE_STORAGE_VOLUME_PATH}:/usr/share/ibim-license-management/storage/
    healthcheck:
      test: ["CMD-SHELL", "exit 0"]
      interval: 60s
      timeout: 10s
      retries: 3

